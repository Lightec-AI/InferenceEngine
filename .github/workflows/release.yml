# Tag release: build measured InferenceEngine TypeScript runtime bundle.
# Companion natives (libope_ffi.so, libattested_mtls.so) are re-attached from their
# independent GitHub Releases (same bytes) for convenience — not rebuilt here.
#
# Primary attestation: engine.binary_sha256 = SHA-256 of inference-engine-runtime-*.tar.gz
# Tag with engine train/hotfix semver (e.g. v0.8.1).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout InferenceEngine
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: |
          set -euo pipefail
          # package.json pins @teechat/ope-protocol (and companions) from npm;
          # esbuild --packages=bundle needs node_modules present.
          npm install --no-fund --no-audit

      - name: Pack runtime (+ companion natives)
        env:
          TEECHAT_IE_INCLUDE_NATIVES: "1"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          export TEECHAT_ENGINE_BUILD_VERSION="$VERSION"
          export TEECHAT_IE_PACK_OUT="$PWD/dist/release"
          node scripts/pack-runtime.mjs
          test -f dist/release/SHA256SUMS
          test -f dist/release/RELEASE_MANIFEST.json
          test -f "dist/release/inference-engine-runtime-${VERSION}.tar.gz"
          cat dist/release/SHA256SUMS
          cat dist/release/RELEASE_MANIFEST.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/inference-engine-runtime-*.tar.gz
            dist/release/libope_ffi.so
            dist/release/libattested_mtls.so
            dist/release/SHA256SUMS
            dist/release/RELEASE_MANIFEST.json
          generate_release_notes: true
          body: |
            ## Measured artifact

            - **`inference-engine-runtime-*.tar.gz`** — primary (`engine.binary_sha256`)
            - **`libope_ffi.so`** — companion from [OPE](https://github.com/Lightec-AI/OPE/releases) (independent TCB)
            - **`libattested_mtls.so`** — companion from [teechat-attested-mtls](https://github.com/Lightec-AI/teechat-attested-mtls/releases)

            Private TeeChat guest tarballs wrap this runtime + ops packaging.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
