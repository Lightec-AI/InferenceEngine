# Tag release: attach measured OPE FFI (libope_ffi.so) from the pinned OPE GitHub
# Release — do not rebuild OPE from source. Clients cross-check attestation
# engine.binary_sha256 against this release (see TeeChat
# docs/ops/client-attestation-github-trust.md).
#
# Tag with the **engine train** (X.Y.0, e.g. v0.8.0) so the client can resolve
# https://github.com/Lightec-AI/InferenceEngine/releases/tag/v{engine.version}.
#
# Pins: config/tcb-pins.json (OPE asset URL + libopeFfiSha256).
# Break-glass local rebuild: npm run build:ffi (not used by this workflow).
#
# The deployable engine tarball (Node launcher + packaging) is built in the
# *private* TeeChat monorepo around this measured .so — never checked out here.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout InferenceEngine
        uses: actions/checkout@v4
        with:
          path: InferenceEngine

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch pinned libope_ffi.so from OPE Release
        working-directory: InferenceEngine
        run: |
          set -euo pipefail
          node scripts/fetch-ope-ffi.mjs
          mkdir -p dist
          cp -a native/libope_ffi.so dist/libope_ffi.so
          (
            cd dist
            sha256sum libope_ffi.so | tee SHA256SUMS
          )
          OPE_SHA="$(awk '/libope_ffi\.so$/ {print $1}' dist/SHA256SUMS)"
          VERSION="${GITHUB_REF_NAME#v}"
          OPE_TAG="$(node -e 'const p=require("./config/tcb-pins.json"); process.stdout.write(p.ope.tag||"")')"
          OPE_GIT="$(node -e 'const p=require("./config/tcb-pins.json"); process.stdout.write(p.ope.gitSha||"")')"
          OPE_VER="$(node -e 'const p=require("./config/tcb-pins.json"); process.stdout.write(p.ope.version||"")')"
          python3 - "$OPE_SHA" "$OPE_GIT" "$VERSION" "$GITHUB_REF_NAME" "$OPE_TAG" "$OPE_VER" <<'PY'
          import json, sys
          ope_sha, ope_git, version, tag, ope_tag, ope_ver = sys.argv[1:7]
          if not ope_sha or len(ope_sha) != 64:
              raise SystemExit("empty ope sha")
          doc = {
            "schema": "teechat-inference-engine-release/v1",
            "version": version,
            "tag": tag,
            "opeFfiSha256": ope_sha,
            "opeGitSha": ope_git,
            "opeVersion": ope_ver,
            "opeTag": ope_tag,
            "opeAssetSource": "Lightec-AI/OPE GitHub Release (re-attached, not rebuilt)",
            "notes": "Measured artifact is libope_ffi.so (attestation engine.binary_sha256).",
          }
          open("dist/RELEASE_MANIFEST.json", "w", encoding="utf-8").write(
            json.dumps(doc, indent=2) + "\n"
          )
          PY
          echo "----- SHA256SUMS -----"
          cat dist/SHA256SUMS
          echo "----- RELEASE_MANIFEST.json -----"
          cat dist/RELEASE_MANIFEST.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            InferenceEngine/dist/libope_ffi.so
            InferenceEngine/dist/SHA256SUMS
            InferenceEngine/dist/RELEASE_MANIFEST.json
          generate_release_notes: true
          body: |
            ## Measured artifact

            Clients verify `engine.binary_sha256` against **`SHA256SUMS`** / `libope_ffi.so`.

            This file is the **OPE** GitHub Release asset re-attached here (same bytes;
            see `config/tcb-pins.json`). It is **not** rebuilt from OPE source in this workflow.

            The deployable `teechat-engine-*.tar.gz` is packaged in the private TeeChat
            monorepo around this `.so` (see TeeChat `config/ope-version.json` +
            `scripts/ops/build-engine-release.sh`).

            Tag this release with the **engine train** (e.g. `v0.8.0`, always X.Y.0) that appears in attestation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
