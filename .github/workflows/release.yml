# Tag release: build measured OPE FFI (libope_ffi.so), record SHA256SUMS.
#
# Clients cross-check attestation engine.binary_sha256 against this release
# (see TeaChat docs/ops/client-attestation-github-trust.md).
#
# Tag with the **engine train** (X.Y.0, e.g. v0.8.0) so the client can resolve
# https://github.com/Lightec-AI/InferenceEngine/releases/tag/v{engine.version}.
# Same minor-train practice as gateway — use bump-engine-version, not revision tags.
#
# Optional: set repo variable OPE_REF to pin Lightec-AI/OPE (commit SHA or tag).
# Default: OPE main at workflow time — for production cuts, pin OPE_REF to the
# commit that built the deployed guest FFI.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout InferenceEngine
        uses: actions/checkout@v4
        with:
          path: InferenceEngine

      - name: Checkout OPE (FFI source)
        uses: actions/checkout@v4
        with:
          repository: Lightec-AI/OPE
          path: ope
          # Optional repo variable OPE_REF (commit/tag). Empty → OPE default branch.
          ref: ${{ vars.OPE_REF }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ope → target

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build libope_ffi.so
        working-directory: InferenceEngine
        env:
          TEECHAT_OPE_DIR: ${{ github.workspace }}/ope
        run: |
          set -euo pipefail
          npm run build:ffi
          SO="${TEECHAT_OPE_DIR}/target/release/libope_ffi.so"
          test -f "$SO"
          mkdir -p dist
          cp -a "$SO" dist/libope_ffi.so
          (
            cd dist
            sha256sum libope_ffi.so | tee SHA256SUMS
          )
          OPE_SHA="$(awk '{print $1}' dist/SHA256SUMS)"
          OPE_GIT="$(git -C "$TEECHAT_OPE_DIR" rev-parse HEAD)"
          VERSION="${GITHUB_REF_NAME#v}"
          python3 - "$OPE_SHA" "$OPE_GIT" "$VERSION" "$GITHUB_REF_NAME" <<'PY'
          import json, sys
          ope_sha, ope_git, version, tag = sys.argv[1:5]
          doc = {
            "schema": "teechat-inference-engine-release/v1",
            "version": version,
            "tag": tag,
            "opeFfiSha256": ope_sha,
            "opeGitSha": ope_git,
            "notes": "Measured artifact is libope_ffi.so (attestation engine.binary_sha256).",
          }
          open("dist/RELEASE_MANIFEST.json", "w", encoding="utf-8").write(
            json.dumps(doc, indent=2) + "\n"
          )
          PY
          echo "----- SHA256SUMS -----"
          cat dist/SHA256SUMS
          echo "----- RELEASE_MANIFEST.json -----"
          cat dist/RELEASE_MANIFEST.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            InferenceEngine/dist/libope_ffi.so
            InferenceEngine/dist/SHA256SUMS
            InferenceEngine/dist/RELEASE_MANIFEST.json
          generate_release_notes: true
          body: |
            ## Measured artifact

            Clients verify `engine.binary_sha256` against **`SHA256SUMS`** / `libope_ffi.so`.

            Tag this release with the **engine train** (e.g. `v0.8.0`, always X.Y.0) that appears in attestation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
